<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script>
window.onload = function() {

const isAndroid = /android/i.test(navigator.userAgent);

if (isAndroid) {

const modelUrl = "https://taran91.github.io/ar-project/models/model.glb";

const intent = `intent://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(modelUrl)}&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;end;`;

window.location.replace(intent);

} else {

document.body.innerHTML =
"<h2 style='font-family:sans-serif;text-align:center;margin-top:20%'>Please scan with an Android phone</h2>";

}

}
</script>

</head>

<body style="background:black;color:white;">
<p style="text-align:center;margin-top:20%;font-family:sans-serif;">
Launching AR...
</p>
</body>
</html>
