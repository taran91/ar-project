<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tezor AR Model Viewer</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
      body { margin: 0; padding: 0; background-color: #f4f4f4; }
      /* Make the viewer take up the whole screen */
      model-viewer {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>

    <model-viewer 
      src="1.glb" 
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      tone-mapping="neutral" 
      shadow-intensity="1">
      
      <button slot="ar-button" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; font-size: 16px; border-radius: 8px; border: none; background-color: #007bff; color: white; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); cursor: pointer;">
        View in AR
      </button>

    </model-viewer>

  </body>
</html>
